name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run tauri build --bundles deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: src-tauri/target/release/bundle/deb

  linux-rpm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run tauri build --bundles rpm
      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: src-tauri/target/release/bundle/rpm

  linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: bun install
      - run: bun run tauri build --bundles appimage
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: bun run tauri build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/bundle/nsis

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: bun run tauri build --bundles app,dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle

  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: bun install
      - run: bun run tauri build --bundles none
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/25.2.9519653
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/target/*/build/*/outputs/apk
